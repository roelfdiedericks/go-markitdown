<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>go-markitdown HTML fixture</title>
</head>
<body>
    <article>
        <h1>Hello, markdown</h1>
        <p>This is a <strong>minimal</strong> HTML fixture used by the
        go-markitdown integration tests. The <em>readability</em> pass and the
        <code>html-to-markdown</code> converter should both be exercised.</p>

        <h2>Lists</h2>
        <ul>
            <li>alpha</li>
            <li>beta</li>
            <li>gamma</li>
        </ul>

        <h2>Table</h2>
        <table>
            <thead>
                <tr><th>Name</th><th>Score</th></tr>
            </thead>
            <tbody>
                <tr><td>Alice</td><td>42</td></tr>
                <tr><td>Bob</td><td>17</td></tr>
            </tbody>
        </table>

        <p>Terminating paragraph with a <a href="https://example.com">link</a>.</p>
    </article>
</body>
</html>
